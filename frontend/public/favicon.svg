<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- ── Fond : carré arrondi sombre ────────────────────────────── -->
  <rect width="48" height="48" rx="10" fill="#0f1117"/>

  <!-- ── Ombre portée du livre (profondeur) ────────────────────── -->
  <ellipse cx="24" cy="41" rx="13" ry="2.5" fill="#000" opacity="0.35"/>

  <!-- ── Page gauche (légèrement courbée vers la reliure) ────────── -->
  <path d="M22 9 C18 10 12 11 8 13 L8 37 C12 35 18 35.5 22 37 Z"
        fill="#e8edf8"/>
  <!-- bord extérieur gauche (épaisseur page) -->
  <path d="M8 13 L8 37" stroke="#c8d0e0" stroke-width="0.8"/>

  <!-- ── Page droite ────────────────────────────────────────────── -->
  <path d="M26 9 C30 10 36 11 40 13 L40 37 C36 35 30 35.5 26 37 Z"
        fill="#e8edf8"/>
  <!-- bord extérieur droit -->
  <path d="M40 13 L40 37" stroke="#c8d0e0" stroke-width="0.8"/>

  <!-- ── Reliure (spine) — orange vif avec reflet ──────────────── -->
  <rect x="21.5" y="9" width="5" height="28" rx="2.5" fill="#ff8c00"/>
  <!-- reflet central sur la reliure -->
  <rect x="23" y="9" width="1.5" height="28" rx="0.75" fill="#ffb74d" opacity="0.55"/>

  <!-- ── Ligne surlignée (lecture active) — page gauche ─────────── -->
  <rect x="10" y="14.5" width="10" height="3.5" rx="1.75" fill="#ff8c00" opacity="0.22"/>
  <!-- texte de la ligne surlignée -->
  <rect x="10.5" y="15.5" width="9" height="1.5" rx="0.75" fill="#ff8c00" opacity="0.9"/>

  <!-- ── Lignes de texte — page gauche ─────────────────────────── -->
  <rect x="10.5" y="20.5" width="9" height="1.5" rx="0.75" fill="#8a9bb5" opacity="0.85"/>
  <rect x="10.5" y="24"   width="7" height="1.5" rx="0.75" fill="#8a9bb5" opacity="0.65"/>
  <rect x="10.5" y="27.5" width="9" height="1.5" rx="0.75" fill="#8a9bb5" opacity="0.50"/>
  <rect x="10.5" y="31"   width="6" height="1.5" rx="0.75" fill="#8a9bb5" opacity="0.35"/>

  <!-- ── Lignes de texte — page droite ─────────────────────────── -->
  <rect x="27.5" y="15.5" width="9" height="1.5" rx="0.75" fill="#8a9bb5" opacity="0.85"/>
  <rect x="27.5" y="20.5" width="9" height="1.5" rx="0.75" fill="#8a9bb5" opacity="0.75"/>
  <rect x="27.5" y="24"   width="7" height="1.5" rx="0.75" fill="#8a9bb5" opacity="0.60"/>
  <rect x="27.5" y="27.5" width="9" height="1.5" rx="0.75" fill="#8a9bb5" opacity="0.45"/>
  <rect x="27.5" y="31"   width="5" height="1.5" rx="0.75" fill="#8a9bb5" opacity="0.30"/>

  <!-- ── Curseur de lecture (triangle orange) — page droite ──────── -->
  <path d="M38 14.5 L41 17 L38 19.5 Z" fill="#ff8c00" opacity="0.85"/>
</svg>
